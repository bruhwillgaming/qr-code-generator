<html>
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=10">
    <title>QR Code Gen</title>
    <hta:application id="oQR" border="thin" scroll="no" maximizebutton="no" width="450" height="750" />
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>

    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #000; color: white; 
            margin: 0; padding: 0; 
            text-align: center; /* This centers the inline-block children */
        }
        
        /* Full screen overlays */
        #loader, #errorScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 99; 
            padding-top: 25%; /* Adjusts vertical height for the spinner */
        }

        .spinner {
            width: 50px; height: 50px; margin: 0 auto;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text { 
            font-family: 'Segoe UI Semilight', 'Segoe Boot Semilight', sans-serif; 
            margin-top: 30px; color: #fff; font-size: 20px; display: block;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .win-warning {
            width: 0; height: 0; margin: 0 auto 20px auto;
            border-left: 40px solid transparent; border-right: 40px solid transparent;
            border-bottom: 70px solid #fcd116; position: relative;
        }
        .win-warning:after {
            content: "!"; font-family: 'Segoe UI', Arial; font-weight: bold; 
            font-size: 40px; color: #000; position: absolute; left: -5px; top: 15px;
        }

        /* Container for the UI elements */
        .wrapper {
            padding: 30px 0;
            display: inline-block; /* Allows text-align: center to work on the div itself */
            width: 380px;
        }

        .card { 
            background: #1a1a1a; padding: 25px; 
            border-radius: 8px; border: 1px solid #333; 
            margin-bottom: 20px;
        }
        
        input { 
            width: 100%; padding: 12px; margin-bottom: 15px; 
            background: #2b2b2b; border: 1px solid #444; color: white; 
            border-radius: 4px; font-size: 14px; box-sizing: border-box;
        }
        
        canvas { border: 10px solid white; background: white; margin-bottom: 10px; max-width: 260px; }
        
        .btn { padding: 12px; cursor: pointer; color: white; border: none; border-radius: 4px; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-main { background: #0078d7; }
        .btn-main:hover { background: #1e8ad2; }
        .btn-alt { background: #333; font-size: 12px; padding: 8px; border: 1px solid #444; color: #ccc; }
        
        /* The File Menu Box - Now sits UNDER the main card */
        #fileMenu { 
            display: none; padding: 15px; 
            background: #1a1a1a; border-radius: 8px; 
            border: 1px dashed #444; margin-top: 5px;
        }
        .file-link { 
            display: inline-block; width: 28%; margin: 5px; padding: 8px; 
            background: #2b2b2b; border: 1px solid #444; cursor: pointer; 
            font-size: 11px; color: #eee; border-radius: 4px;
        }
        .file-link:hover { background: #0078d7; border-color: #fff; }
        
        .status { font-size: 13px; color: #00ff00; margin-top: 12px; font-weight: bold; height: 15px; }
    </style>

    <script language="vbscript">
        Function GetUser()
            On Error Resume Next
            Set network = CreateObject("WScript.Network")
            GetUser = network.UserName
            If GetUser = "" Then GetUser = "User"
        End Function

        Sub PlaySound()
            On Error Resume Next
            CreateObject("WScript.Shell").Run "powershell -WindowStyle Hidden -Command ""(New-Object Media.SoundPlayer 'C:\Windows\Media\Windows Logon.wav').PlaySync()""", 0, False
        End Sub

        Sub SaveFileVBS(base64Str, fileName)
            On Error Resume Next
            Set shell = CreateObject("WScript.Shell")
            p = shell.ExpandEnvironmentStrings("%USERPROFILE%") & "\Downloads\" & fileName
            Set xml = CreateObject("MSXML2.DOMDocument")
            Set node = xml.createElement("b64")
            node.dataType = "bin.base64" : node.text = base64Str
            Set stream = CreateObject("ADODB.Stream")
            stream.Type = 1 : stream.Open : stream.Write node.nodeTypedValue
            stream.SaveToFile p, 2 : stream.Close
        End Sub
    </script>
</head>

<body onload="StartBoot()">


    <div id="loader">
        <div class="spinner"></div>
        <div id="loadText" class="loading-text">Loading..</div>
    </div>

    <div class="wrapper">
        <div class="card">
            <h3>QR Code Gen</h3>
            <input type="text" id="linkInput" placeholder="Enter link" value="" onkeyup="UpdateQR()">
            <canvas id="qrCanvas"></canvas>
            <button class="btn btn-main" onclick="RunSave('png')">Download PNG</button>
            <button class="btn btn-alt" onclick="ShowMenu()">More File Options</button>
            <div id="statusMsg" class="status"></div>
        </div>

        <div id="fileMenu">
            <div class="file-link" onclick="RunSave('jpg')">.JPEG</div>
            <div class="file-link" onclick="RunSave('bmp')">.BMP</div>
            <div class="file-link" onclick="RunSave('webp')">.WEBP</div>
            <div class="file-link" onclick="RunSave('svg')">.SVG</div>
            <div class="file-link" onclick="RunSave('gif')">.GIF</div>
            <div class="file-link" onclick="RunSave('ai')">.AI</div>
        </div>
    </div>

    <script language="javascript">
        var qrObj = null;

        function StartBoot() {
            document.getElementById("loader").style.display = "block";
            var u = "User";
            try { u = window.GetUser(); } catch(e) {}

            var txt = document.getElementById("loadText");
            setTimeout(function(){ txt.innerHTML = "Checking for updates..."; }, 2000);
            setTimeout(function(){ txt.innerHTML = "Running qrious..."; }, 5000);
            setTimeout(function(){ txt.innerHTML = "Running cdnjs.cloudflare.com..."; }, 6000);
            setTimeout(function(){ txt.innerHTML = "Connecting to Cloudflare..."; }, 7000);
            setTimeout(function(){ txt.innerHTML = "Authorizing " + u + " to Cloudflare... May take 3-4 seconds."; }, 8000);
            
            setTimeout(function(){ 
                try { window.PlaySound(); } catch(e) {}
                UpdateQR();
                document.getElementById("loader").style.display = "none";
            }, 12000);
        }

        function UpdateQR() {
            var val = document.getElementById("linkInput").value;
            if (!qrObj) {
                qrObj = new QRious({ element: document.getElementById('qrCanvas'), size: 250, value: val });
            } else {
                qrObj.value = val;
            }
        }

        function RunSave(ext) {
            try {
                var canvas = document.getElementById("qrCanvas");
                var data = canvas.toDataURL("image/png").split(',')[1];
                var name = "QR_" + new Date().getTime() + "." + ext;
                window.SaveFileVBS(data, name);
                document.getElementById("statusMsg").innerHTML = "Saved in downloads folder.";
                // Reset status after a few seconds
                setTimeout(function(){ document.getElementById("statusMsg").innerHTML = ""; }, 3000);
            } catch(e) { alert("Error: " + e.message); }
        }

        function ShowMenu() {
            var m = document.getElementById("fileMenu");
            m.style.display = (m.style.display == "block") ? "none" : "block";
        }
    </script>
</body>
</html>
